<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
     <link rel="stylesheet" href="./Clock.css">
</head>
<body>
    <div class="Clock-box">
         <div id="Time"></div>
        <div id="Date"></div>
        <div id="DMN"></div>
        <button onclick="showDateDay()" class="btn btn-primary">Show Date & Day</button>
        <button onclick="hideDateDay()" class="btn btn-danger">Hide Date & Day</button>
       </div>
    <script>
        function showTime(){
        var date = new Date();
        var h = date.getHours();
        var m = date.getMinutes();
        var s = date.getSeconds();
        var session = "PM";

        if (h==0){
            h=12;  //12 hours format
        }
        if (h>12){
            h=h-12;
            session ="PM"
        }
            else{
                session="AM"
            }

       h = (h<10)?"0"+h:h;
       m = (m<10)?"0"+m:m;
       s = (s<10)?"0"+s:s;
       document.getElementById("Time").innerHTML = h + ":" + m + ":" + s + " "+ `'${session}'`;
        setTimeout(showTime,1000);
        }

        function showDateDay(){
        const day = ["Sun", "Mon", "Tue", "Wed", "Thur", "Fri", "Sat"];
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "July", "Aug", "Sep", "Oct", "Nov", "Dec"];
        var date = new Date();
        var d = date.getDate();
        var m = date.getMonth()+1;
        var y = date.getFullYear();
        var today = day[date.getDay()];
        var mn = months[date.getMonth()];

        d = (d<10)?"0"+d:d
        m = (m<10)?"0"+m:m;
        document.getElementById("Date").innerHTML = d + " - " + m + " - " + y;
        document.getElementById("Date").style.display = "block";
        document.getElementById("DMN").innerHTML = today + " - " + mn;
        document.getElementById("DMN").style.display = "block";
        }
        function hideDateDay(){
          document.getElementById("Date").style.display = "none";
          document.getElementById("DMN").style.display = "none";
        }
        showTime();
    </script>
</body>
</html>
